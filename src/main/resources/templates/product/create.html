<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{_layout}">
<head><title>Create Product</title></head>
<body>
<div layout:fragment="content">

    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-5">

            <div class="card shadow border-0 rounded-4 overflow-hidden">
                <div class="card-header text-white py-3 px-4"
                     style="background:#1a1a2e; border-bottom: 3px solid #e94560;">
                    <h5 class="mb-0 fw-bold">➕ Create Product</h5>
                </div>

                <div class="card-body p-4">
                    <form th:action="@{/products/create}"
                          th:object="${product}"
                          method="post"
                          enctype="multipart/form-data"
                          novalidate>

                        <!-- NAME -->
                        <div class="mb-3">
                            <label class="form-label">Name</label>
                            <input type="text"
                                   th:field="*{name}"
                                   th:classappend="${#fields.hasErrors('name')} ? 'is-invalid'"
                                   class="form-control"
                                   placeholder="Enter product name">
                            <div class="invalid-feedback"
                                 th:if="${#fields.hasErrors('name')}"
                                 th:errors="*{name}">
                            </div>
                        </div>

                        <!-- PRICE -->
                        <div class="mb-3">
                            <label class="form-label">Price</label>
                            <input type="number"
                                   th:field="*{price}"
                                   th:classappend="${#fields.hasErrors('price')} ? 'is-invalid'"
                                   class="form-control"
                                   placeholder="0">
                            <div class="invalid-feedback"
                                 th:if="${#fields.hasErrors('price')}"
                                 th:errors="*{price}">
                            </div>
                        </div>

                        <!-- IMAGE -->
                        <div class="mb-3">
                            <label class="form-label">Image</label>
                            <input type="file"
                                   name="imageProduct"
                                   class="form-control"
                                   accept="image/png, image/jpeg">
                        </div>

                        <!-- CATEGORY -->
                        <div class="mb-4">
                            <label class="form-label">Category</label>
                            <select name="categoryId" class="form-select">
                                <option value="" disabled selected>-- Select category --</option>
                                <option th:each="cat : ${categories}"
                                        th:value="${cat.id}"
                                        th:text="${cat.name}">
                                </option>
                            </select>
                        </div>

                        <div class="d-flex gap-2">
                            <button type="submit" class="btn btn-success fw-semibold flex-fill">
                                ✔ Add Product
                            </button>
                            <a th:href="@{/products}" class="btn btn-outline-secondary fw-semibold">
                                Cancel
                            </a>
                        </div>

                    </form>
                </div>
            </div>

        </div>
    </div>

</div>
</body>
</html>
