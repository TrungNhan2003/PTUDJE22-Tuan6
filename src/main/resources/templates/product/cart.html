<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{_layout}">
<body>
<div layout:fragment="content">

    <div class="d-flex justify-content-between align-items-center mb-4">
        <h4 class="fw-bold mb-0">🛒 Shopping Cart</h4>
        <a th:href="@{/products}" class="btn btn-secondary">← Back to Products</a>
    </div>

    <div class="card shadow-sm border-0 rounded-3 overflow-hidden">
        <table class="table table-hover text-center align-middle mb-0">
            <thead style="background:#1a1a2e; color:#fff;">
            <tr>
                <th>#</th>
                <th>Tên</th>
                <th>Giá</th>
                <th>Số lượng</th>
                <th>Tổng tiền</th>
                <th>Action</th>
            </tr>
            </thead>
            <tbody>
            <tr th:if="${#lists.isEmpty(cart)}">
                <td colspan="6" class="py-4 text-muted">Cart is empty.</td>
            </tr>

            <tr th:each="item, stat : ${cart}">
                <td th:text="${stat.index + 1}"></td>
                <td th:text="${item.product.name}"></td>
                <td th:text="${item.product.price}"></td>
                <td>
                    <form th:action="@{/cart/update}" method="post" class="d-flex justify-content-center">
                        <input type="hidden" name="id" th:value="${item.product.id}">
                        <input type="number" name="quantity" min="1"
                               th:value="${item.quantity}"
                               class="form-control form-control-sm w-50 me-2">
                        <button type="submit" class="btn btn-sm btn-primary">Update</button>
                    </form>
                </td>
                <td th:text="${item.product.price * item.quantity}"></td>
                <td>
                    <a th:href="@{'/cart/remove/' + ${item.product.id}}"
                       class="btn btn-danger btn-sm"
                       onclick="return confirm('Remove this item?')">
                        Remove
                    </a>
                </td>
            </tr>
            </tbody>
        </table>
    </div>

    <div class="d-flex justify-content-between align-items-center mt-3">
        <h5>
            Tổng tiền tất cả:
            <span class="text-danger fw-bold" th:text="${total}"></span>
        </h5>

        <form th:if="${not #lists.isEmpty(cart)}" th:action="@{/cart/checkout}" method="post">
            <button type="submit" class="btn btn-success">
                Checkout
            </button>
        </form>
    </div>

</div>
</body>
</html>
