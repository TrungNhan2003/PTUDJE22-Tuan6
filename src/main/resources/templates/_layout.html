<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Product Management</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root {
            --primary:    #1a1a2e;
            --accent:     #e94560;
            --accent2:    #0f3460;
            --surface:    #ffffff;
            --surface2:   #f4f6fb;
            --border:     #e2e8f0;
            --text-muted: #64748b;
            --success:    #10b981;
            --danger:     #ef4444;
        }
        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--surface2);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        /* NAVBAR */
        .navbar {
            background: var(--primary) !important;
            border-bottom: 3px solid var(--accent);
            box-shadow: 0 2px 16px rgba(0,0,0,0.2);
        }
        .navbar-brand {
            font-weight: 700;
            font-size: 1.15rem;
            color: #fff !important;
        }
        .navbar-brand span { color: var(--accent); }
        .nav-link {
            color: rgba(255,255,255,0.75) !important;
            font-weight: 500;
            border-radius: 6px;
            transition: all 0.2s;
        }
        .nav-link:hover { color: #fff !important; background: rgba(233,69,96,0.2); }
        .search-input {
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2) !important;
            border-right: none !important;
            color: #fff !important;
            border-radius: 8px 0 0 8px !important;
            font-size: 0.875rem;
            min-width: 200px;
        }
        .search-input::placeholder { color: rgba(255,255,255,0.4); }
        .search-input:focus {
            background: rgba(255,255,255,0.15) !important;
            border-color: var(--accent) !important;
            box-shadow: none !important;
            color: #fff !important;
        }
        .btn-search {
            background: var(--accent);
            border: none;
            color: #fff;
            font-weight: 600;
            font-size: 0.875rem;
            border-radius: 0 8px 8px 0;
            padding: 0.45rem 1rem;
        }
        .btn-search:hover { background: #c73652; color: #fff; }
        /* CONTENT */
        .content-wrapper { flex: 1; padding: 2rem 0; }
        /* FOOTER */
        footer {
            background: var(--primary);
            color: rgba(255,255,255,0.5);
            padding: 14px 0;
            font-size: 0.82rem;
            border-top: 3px solid var(--accent);
            text-align: center;
        }
        footer strong { color: var(--accent); }
        /* SHARED FORM STYLES */
        .form-label {
            font-weight: 600;
            font-size: 0.8rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.06em;
        }
        .form-control, .form-select {
            border: 1.5px solid var(--border);
            border-radius: 8px;
            font-size: 0.9rem;
            padding: 0.55rem 0.85rem;
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        .form-control:focus, .form-select:focus {
            border-color: var(--accent2);
            box-shadow: 0 0 0 3px rgba(15,52,96,0.12);
        }
        .form-control.is-invalid, .form-select.is-invalid {
            border-color: var(--danger) !important;
            background-image: none;
        }
        .invalid-feedback { font-size: 0.8rem; font-weight: 500; }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg">
    <div class="container">
        <a class="navbar-brand" th:href="@{/products}">
            🛒 Product<span>Manager</span>
        </a>
        <button class="navbar-toggler border-0" type="button"
                data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav me-auto ms-2">
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/products}">Home</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/products/create}">+ Create Product</a>
                </li>
            </ul>
            <form class="d-flex" th:action="@{/products}" method="get">
                <input class="form-control search-input"
                       type="search" name="keyword"
                       placeholder="Search product...">
                <button class="btn btn-search" type="submit">Search</button>
            </form>
        </div>
    </div>
</nav>

<div class="content-wrapper">
    <div layout:fragment="content" class="container"></div>
</div>

<footer>
    <p class="mb-0">© 2025 — Phát triển ứng dụng với J2EE &nbsp;|&nbsp; <strong>Trung Nhân</strong></p>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
